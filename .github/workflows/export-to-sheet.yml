name: Export saved listings to Google Sheet

on:
  repository_dispatch:
    types: [telegram-export]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Export to Google Sheet
        run: python export_to_sheet.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          LISTINGS_JSON: ${{ toJson(github.event.client_payload.listings) }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EXPORT_SHEET_ID: ${{ secrets.EXPORT_SHEET_ID }}
