name: Telegram Donate - Scrape Blood Donation Images

on:
  repository_dispatch:
    types: [telegram-donate]
  schedule:
    - cron: "0 11 * * 5"  # 每週五 19:00 台灣時間 (UTC+8)

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright requests

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Scrape and send blood donation images
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.client_payload.chat_id || secrets.TELEGRAM_DEFAULT_CHAT_ID }}
        run: python donate_notify.py
