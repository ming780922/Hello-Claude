name: PTT LifeIsMoney RSS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"  # 每 5 分鐘
  workflow_dispatch:  # 手動觸發（測試用）

jobs:
  check-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore RSS state cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ptt_rss_state.json
          key: ptt-rss-state-${{ github.run_id }}
          restore-keys: |
            ptt-rss-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check RSS and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: python ptt_rss_monitor.py

      - name: Save RSS state cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/ptt_rss_state.json
          key: ptt-rss-state-${{ github.run_id }}
