name: PTT LifeIsMoney RSS Monitor

on:
  schedule:
    - cron: "*/5 * * * *"  # 每 5 分鐘
  workflow_dispatch:  # 手動觸發（測試用）

jobs:
  check-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Restore RSS state cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ptt_rss_state.json
          key: ptt-rss-state-${{ github.run_id }}
          restore-keys: |
            ptt-rss-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check RSS and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}
          # 透過 Cloudflare Worker 代理取 Feed，繞過 PTT 對 GitHub Actions IP 的封鎖
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          python3 << 'EOF'
          import requests, json, os, sys
          import xml.etree.ElementTree as ET

          BOT_TOKEN  = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID    = os.environ["CHAT_ID"]
          STATE_FILE = "/tmp/ptt_rss_state.json"
          FEED_URL   = os.environ["WORKER_URL"].rstrip("/") + "/rss/LifeIsMoney"
          NS         = {"atom": "http://www.w3.org/2005/Atom"}

          def send_message(text):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID, "text": text},
                  timeout=15,
              )

          # 讀取上次狀態
          try:
              with open(STATE_FILE) as f:
                  state = json.load(f)
          except FileNotFoundError:
              state = {"seen_ids": []}

          seen_ids = set(state["seen_ids"])
          is_first_run = len(seen_ids) == 0

          # 拉 Feed
          try:
              resp = requests.get(FEED_URL, timeout=15)
              resp.raise_for_status()
          except Exception as e:
              print(f"Feed 取得失敗：{e}")
              sys.exit(1)

          root = ET.fromstring(resp.text)
          entries = root.findall("atom:entry", NS)

          # 找出新文章（保持順序，由舊到新推播）
          new_entries = []
          current_ids = []
          for entry in entries:
              eid = entry.findtext("atom:id", namespaces=NS) or ""
              current_ids.append(eid)
              if eid and eid not in seen_ids:
                  title    = entry.findtext("atom:title", namespaces=NS) or "(無標題)"
                  link_el  = entry.find("atom:link", NS)
                  link     = link_el.get("href") if link_el is not None else ""
                  new_entries.append({"id": eid, "title": title, "link": link})

          if is_first_run:
              print(f"首次執行，記錄 {len(current_ids)} 篇文章，不推播。")
          elif new_entries:
              print(f"發現 {len(new_entries)} 篇新文章，推播中...")
              for e in reversed(new_entries):  # 由舊到新
                  msg = f"[PTT/LifeIsMoney] {e['title']}\n{e['link']}"
                  send_message(msg)
                  print(f"  已送出：{e['title']}")
          else:
              print("無新文章。")

          # 更新狀態
          state["seen_ids"] = [eid for eid in current_ids if eid]
          with open(STATE_FILE, "w") as f:
              json.dump(state, f)
          EOF

      - name: Save RSS state cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/ptt_rss_state.json
          key: ptt-rss-state-${{ github.run_id }}
