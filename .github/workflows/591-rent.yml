name: 591 Rent Crawler

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cron-591-rent, telegram-591]
  schedule:
    - cron: '0 0-16 * * *'  # 每小時整點，台灣時間 08:00–00:00（UTC 0–16）

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Notify starting
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id || secrets.TELEGRAM_DEFAULT_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"591 租屋爬蟲即將執行，請稍候...\"}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore persistence files
        uses: actions/cache@v3
        with:
          path: |
            591_storage.json
            591_seen_history.json
          key: 591-crawler-persistence-${{ github.run_id }}
          restore-keys: |
            591-crawler-persistence-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run crawler
        env:
          SHEET_591_URL: ${{ secrets.SHEET_591_URL }}
          591_COOKIES_JSON: ${{ secrets.COOKIES_591_JSON }}
        run: python crawler_591.py

      - name: Run Telegram notifier
        run: python notify_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id || secrets.TELEGRAM_DEFAULT_CHAT_ID }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: rent-data-${{ github.run_number }}
          path: |
            591_rent_data.json
            591_storage.json
            591_seen_history.json

